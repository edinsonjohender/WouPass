name: woupassv2
description: Zero-knowledge password manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Crypto
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.4

  # Functional programming
  fpdart: ^1.1.0

  # Biometrics
  local_auth: ^2.3.0

  # TOTP
  otp: ^3.1.4

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.5

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  iconsax_flutter: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1
  custom_lint:
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
